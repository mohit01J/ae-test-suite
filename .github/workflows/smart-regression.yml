name: Smart Regression — Chrome

on:
  workflow_dispatch:
    inputs:
      pr_title: { description: "PR title", required: true }
      pr_body: { description: "PR body", required: true }
      changed_files: { description: "Changed files", required: true }
      pr_number: { description: "PR number", required: true }
      dev_repo: { description: "Dev repo name", required: true }

jobs:
  smart-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ae-test-suite
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install dependencies
        run: npm ci

      # NEW
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Install tsx
        run: npm install -g tsx

      # ── STEP 1: Claude filters which tests to run ──
      - name: Filter tests with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_BODY: ${{ inputs.pr_body }}
          CHANGED_FILES: ${{ inputs.changed_files }}
        run: tsx scripts/filter-tests.ts

      - name: Show selected tests
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TESTS SELECTED:"
          cat selected-tests.json
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── STEP 2: Run selected tests in Chrome ──
      - name: Run selected tests in Chrome
        run: |
          TESTS=$(cat selected-tests.json | python3 -c "import sys,json; print(' '.join(json.load(sys.stdin)))")
          echo "Running: $TESTS"
          npx playwright test $TESTS \
            --reporter=list,json \
            --project=chromium

      # ── STEP 3: Upload test report as artifact ──
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ inputs.pr_number }}
          path: |
            test-results.json
            playwright-report/
          retention-days: 7

      # ── STEP 4: Summary ──
      - name: Run summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SMART REGRESSION COMPLETE"
          echo "  PR:            #${{ inputs.pr_number }}"
          echo "  Changed files: ${{ inputs.changed_files }}"
          echo "  Runner:        GitHub Ubuntu + Chrome"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat test-results.json | python3 -c "import sys,json; data=json.load(sys.stdin); specs=[s for suite in data.get('suites',[]) for s in suite.get('specs',[])]; passed=sum(1 for s in specs if s.get('ok')); failed=sum(1 for s in specs if not s.get('ok')); print(f'  Passed: {passed}\n  Failed: {failed}\n  Total:  {passed+failed}')" || echo "  Results file not available"
