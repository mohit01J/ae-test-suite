name: Smart Regression — BrowserStack

on:
  workflow_dispatch:
    inputs:
      pr_title:      { description: 'PR title',      required: true }
      pr_body:       { description: 'PR body',        required: true }
      changed_files: { description: 'Changed files',  required: true }
      pr_number:     { description: 'PR number',      required: true }
      dev_repo:      { description: 'Dev repo name',  required: true }

jobs:
  smart-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ae-test-suite
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm ci

      - name: Install tsx
        run: npm install -g tsx

      # ── STEP 1: Claude filters which tests to run ──
      - name: Filter tests with Claude
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          PR_TITLE:           ${{ inputs.pr_title }}
          PR_BODY:            ${{ inputs.pr_body }}
          CHANGED_FILES:      ${{ inputs.changed_files }}
        run: tsx scripts/filter-tests.ts

      - name: Show selected tests
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TESTS SELECTED BY CLAUDE:"
          cat selected-tests.json
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── STEP 2: Setup BrowserStack environment ──
      - name: BrowserStack env setup
        uses: browserstack/github-actions/setup-env@master
        with:
          username:     ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key:   ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          build-name:   "PR-${{ inputs.pr_number }}-smart-regression"
          project-name: "AutomationExercise Smart QA"

      # ── STEP 3: Create a fresh BStack TM test run ──
      - name: Create BStack TM test run
        id: create_run
        env:
          BROWSERSTACK_USERNAME:   ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BSTACK_PROJECT_ID:       ${{ secrets.BSTACK_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s \
            -u "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"test_run\": {
                \"name\": \"Smart Regression PR #${{ inputs.pr_number }}\",
                \"description\": \"Triggered by: ${{ inputs.pr_title }}\"
              }
            }" \
            "https://test-management.browserstack.com/api/v2/projects/$BSTACK_PROJECT_ID/test-runs")

          echo "API Response: $RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | jq -r '.test_run.identifier // .identifier // empty')
          if [ -z "$RUN_ID" ]; then
            echo "Failed to extract test run ID from BrowserStack response"
            exit 1
          fi

          echo "Created test run: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      # ── STEP 4: Run only selected tests on BrowserStack ──
      - name: Run selected tests on BrowserStack
        env:
          BROWSERSTACK_USERNAME:   ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BSTACK_PROJECT_ID:       ${{ secrets.BSTACK_PROJECT_ID }}
          BSTACK_TEST_RUN_ID:      ${{ steps.create_run.outputs.run_id }}
        run: |
          TESTS=$(cat selected-tests.json | python3 -c \
            "import sys,json; print(' '.join(json.load(sys.stdin)))")
          echo "Running: $TESTS"
          npx playwright test $TESTS \
            --reporter=list,json \
            --project=chromium

      # ── STEP 5: Summary ──
      - name: Run summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SMART REGRESSION COMPLETE"
          echo "  PR:            #${{ inputs.pr_number }}"
          echo "  Changed files: ${{ inputs.changed_files }}"
          echo "  BStack TM Run: ${{ steps.create_run.outputs.run_id }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          cat test-results.json | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    suites = data.get('suites', [])
    specs = [s for suite in suites for s in suite.get('specs', [])]
    passed = sum(1 for s in specs if s.get('ok'))
    failed = sum(1 for s in specs if not s.get('ok'))
    print(f'  Passed: {passed}')
    print(f'  Failed: {failed}')
    print(f'  Total:  {passed + failed}')
except Exception as e:
    print(f'  Could not parse results: {e}')
" || echo "  Results file not available"