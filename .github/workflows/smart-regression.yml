name: Smart Regression — BrowserStack

on:
  workflow_dispatch:
    inputs:
      pr_title:      { description: 'PR title',      required: true }
      pr_body:       { description: 'PR body',        required: true }
      changed_files: { description: 'Changed files',  required: true }
      pr_number:     { description: 'PR number',      required: true }
      dev_repo:      { description: 'Dev repo name',  required: true }

jobs:
  smart-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ae-test-suite
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node
        run: npm install -g ts-node typescript

      # ── STEP 1: Claude filters which tests to run ──
      - name: Filter tests with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE:          ${{ inputs.pr_title }}
          PR_BODY:           ${{ inputs.pr_body }}
          CHANGED_FILES:     ${{ inputs.changed_files }}
        run: ts-node scripts/filter-tests.ts

      - name: Show selected tests
        run: echo "Selected tests:" && cat selected-tests.json

      # ── STEP 2: Setup BrowserStack environment ──
      - name: BrowserStack env setup
        uses: browserstack/github-actions/setup-env@master
        with:
          username:     ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key:   ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          build-name:   "PR-${{ inputs.pr_number }}-smart-regression"
          project-name: "AutomationExercise Smart QA"

      # ── STEP 3: Create a fresh BStack TM test run for this PR ──
      - name: Create BStack TM test run
        id: create_run
        env:
          BROWSERSTACK_USERNAME:   ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BSTACK_PROJECT_ID:       ${{ secrets.BSTACK_PROJECT_ID }}
        run: |
          RESPONSE=$(curl -s -u \
            "$BROWSERSTACK_USERNAME:$BROWSERSTACK_ACCESS_KEY" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"Smart Regression — PR #${{ inputs.pr_number }}\",
              \"description\": \"Auto triggered by: ${{ inputs.pr_title }}\"
            }" \
            "https://test-management.browserstack.com/api/v2/projects/$BSTACK_PROJECT_ID/test-runs")

          echo "API Response: $RESPONSE"

          RUN_ID=$(echo $RESPONSE | python3 -c \
            "import sys,json; print(json.load(sys.stdin)['test_run']['identifier'])")

          echo "Created test run: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      # ── STEP 4: Run only selected tests on BrowserStack cloud ──
      - name: Run selected tests on BrowserStack
        env:
          BROWSERSTACK_USERNAME:   ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BSTACK_PROJECT_ID:       ${{ secrets.BSTACK_PROJECT_ID }}
          BSTACK_TEST_RUN_ID:      ${{ steps.create_run.outputs.run_id }}
        run: |
          TESTS=$(cat selected-tests.json | python3 -c \
            "import sys,json; print(' '.join(json.load(sys.stdin)))")
          echo "Running: $TESTS"
          npx playwright test $TESTS \
            --reporter=list,json \
            --project=chromium

      # ── STEP 5: Post result comment back to the dev repo PR ──
      # Skipped if pr_number is 0 (manual test run)
      - name: Post result to PR
        if: always() && inputs.pr_number != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TEST_REPO_TOKEN }}
          script: |
            let passed = 0, failed = 0
            try {
              const fs   = require('fs')
              const data = JSON.parse(fs.readFileSync('test-results.json', 'utf8'))
              const specs = data.suites?.flatMap(s => s.specs) ?? []
              passed = specs.filter(s => s.ok).length
              failed = specs.filter(s => !s.ok).length
            } catch(e) {
              console.log('Could not read results:', e.message)
            }
            const icon  = failed === 0 ? '✅' : '❌'
            const runId = '${{ steps.create_run.outputs.run_id }}'
            await github.rest.issues.createComment({
              owner: '${{ inputs.dev_repo }}'.split('/')[0],
              repo:  '${{ inputs.dev_repo }}'.split('/')[1],
              issue_number: Number('${{ inputs.pr_number }}'),
              body: `${icon} **Smart Regression — BrowserStack**\n\n` +
                    `Tests selected by Claude: ${passed + failed}\n` +
                    `✅ Passed: ${passed} &nbsp; ❌ Failed: ${failed}\n\n` +
                    `BStack TM Run: \`${runId}\`\n` +
                    `_Only tests relevant to this PR were run_`
            })

      # ── Manual run summary (shows instead of PR comment when pr_number is 0) ──
      - name: Manual run summary
        if: always() && inputs.pr_number == '0'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  MANUAL TEST RUN COMPLETE"
          echo "  BStack TM Run: ${{ steps.create_run.outputs.run_id }}"
          echo "  Check BrowserStack Automate dashboard"
          echo "  for session recordings and results"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"